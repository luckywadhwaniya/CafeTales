<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CafeTales — Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
    .payment-option { border: 2px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; }
    .payment-option:hover { border-color: #ffb703; background: rgba(255, 183, 3, 0.05); }
    .payment-option input:checked + span { color: #ffb703; font-weight: bold; }
    .checkout-step { display: none; }
    .checkout-step.active { display: block; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body class="bg-dark text-white">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand text-warning fw-bold fs-3" href="index.html">CafeTales</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="menu.html">← Add More Items</a></li>
      </ul>
    </div>
  </nav>

  <!-- ✅ MAIN CHECKOUT CONTAINER (we will replace ONLY this when cart is empty) -->
  <div class="container py-5" id="checkout-container">
    <div class="row g-5">
      <div class="col-lg-7">
        <h2 class="mb-4 fw-bold">Review Order</h2>
        <div id="cart-items" class="d-flex flex-column gap-3 mb-4"></div>

        <div class="glass p-4 mt-4 border-warning">
          <h5 class="text-warning mb-3">📍 Delivery Location</h5>

          <label class="form-label">Select Your Seating</label>
          <select id="table-select" class="form-select bg-dark text-white border-secondary mb-3 p-3" onchange="checkTableInput()">
            <option value="" disabled selected>Loading reservations...</option>
          </select>

          <div id="manual-table-div" style="display:none;">
            <label class="form-label text-white small">Enter Table Number from Stand:</label>
            <input type="number" id="manual-table-input" class="form-control bg-dark text-white border-secondary" placeholder="e.g. 5">
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="glass p-4 sticky-top" style="top: 100px;">
          <h4 class="mb-4 text-warning fw-bold">Payment Details</h4>

          <div id="step-method" class="checkout-step active">
            <div class="d-flex flex-column gap-3">
              <label class="payment-option">
                <input type="radio" name="payMethod" value="Card" onchange="togglePayView('Card')">
                <span>💳 Pay with Card</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="payMethod" value="QR" onchange="togglePayView('QR')">
                <span>📱 Pay via UPI / QR</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="payMethod" value="Counter" onchange="togglePayView('Counter')">
                <span>💵 Pay at Counter</span>
              </label>
            </div>
          </div>

          <div id="view-Card" class="checkout-step mt-3">
            <form id="card-form">
              <label>Card number</label>
              <input type="text" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Card Number" required>

              <div class="row g-2 mb-3">
                <label>MM/YY</label>
                <div class="col-6">
                  <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="MM/YY" required>
                </div>

                <label>CVV</label>
                <div class="col-6">
                  <input type="password" class="form-control bg-dark text-white border-secondary" placeholder="CVV" required>
                </div>
              </div>

              <button type="button" class="btn btn-warning w-100 rounded-pill fw-bold" onclick="processPayment('Card')">Pay Now</button>
            </form>
          </div>

         <div id="view-QR" class="checkout-step mt-3">

  <div class="d-flex flex-column align-items-center justify-content-center">

    <img id="qr-img"
         src=""
         width="220"
         class="mb-4 rounded bg-white p-3 shadow">

    <button class="btn btn-warning px-5 rounded-pill fw-bold"
            onclick="processPayment('QR')">
      I have made payment
    </button>

  </div>

</div>

          <div id="view-Counter" class="checkout-step mt-3">
            <p class="text-warning small">Order will be placed. Pay cash at counter.</p>
            <button class="btn btn-warning w-100 rounded-pill fw-bold" onclick="processPayment('Counter')">Place Order</button>
          </div>

          <button class="btn btn-link text-white w-100 mt-2" onclick="resetView()">Back</button>

          <div class="border-top border-secondary mt-4 pt-3 d-flex justify-content-between fs-4 fw-bold">
            <span>Total</span><span class="pay-amount">₹0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const currentUser = JSON.parse(localStorage.getItem("cafetales_session_v3"));
    if (!currentUser) window.location.href = "login.html";

    let cartTotal = 0;
    let cartHasItems = false; // ✅ will control whether to load table options

    async function loadCart() {
      const fd = new FormData();
      fd.append("action", "get_cart");
      fd.append("user_id", currentUser.id);

      const res = await fetch("api.php", { method: "POST", body: fd });
      const cart = await res.json();

      // ✅ FIX: if cart is empty, replace ONLY checkout-container, so payment etc. won't show
      if (!cart || cart.length === 0) {
        cartHasItems = false;
        document.getElementById("checkout-container").innerHTML = `
          <div class="text-center py-5 glass mt-5">
            <h3>🛒 Empty Cart</h3>
            <a href="menu.html" class="btn btn-warning mt-3">Browse Menu</a>
          </div>
        `;
        return;
      }

      // ✅ Cart has items => render cart + totals + QR
      cartHasItems = true;

      const container = document.getElementById("cart-items");
      container.innerHTML = "";
      cartTotal = 0;

      cart.forEach(item => {
        const itemTotal = item.qty * parseFloat(item.price);
        cartTotal += itemTotal;

        const img = (item.image && item.image !== 'default.jpg')
          ? `uploads/${item.image}`
          : 'https://via.placeholder.com/60';

        container.innerHTML += `
          <div class="d-flex align-items-center gap-3 glass p-3 rounded">
            <img src="${img}" style="width:60px; height:60px; object-fit:cover; border-radius:10px;">
            <div class="flex-grow-1">
              <div class="fw-bold text-white">${item.name}</div>
              <div class="small text-muted">₹${item.price} x ${item.qty}</div>
            </div>
            <div class="fw-bold text-warning">₹${itemTotal}</div>
          </div>
        `;
      });

      document.querySelectorAll(".pay-amount").forEach(el => el.innerText = `₹${cartTotal}`);

      document.getElementById("qr-img").src =
        `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=` +
        encodeURIComponent(`upi://pay?pa=cafetales@upi&pn=CafeTales&am=${cartTotal}&cu=INR`);
    }

    // ✅ TABLE OPTIONS
    async function loadTableOptions() {
      const select = document.getElementById("table-select");
      let html = "";

      try {
        const fd = new FormData();
        fd.append("action", "get_my_reservations_today");
        fd.append("user_id", currentUser.id);

        const res = await fetch("api.php", { method: "POST", body: fd });
        const bookings = await res.json();

        if (bookings && bookings.length > 0) {
          html = `<option value="" disabled selected>-- Select Your Reservation --</option>`;
          bookings.forEach(b => {
            const tableVal = b.table_number ? b.table_number : `RES-${b.id}`;
            const tableText = b.table_number ? b.table_number : "Not Assigned";
            html += `<option value="${tableVal}">Table ${tableText} (${b.seating_area} - ${b.reservation_time})</option>`;
          });
          html += `<option disabled>──────────</option>`;
        }
      } catch (e) {
        console.error(e);
      }

      html += `<option value="walk-in">I don't have a reservation (Walk-in)</option>`;
      select.innerHTML = html;
      checkTableInput();
    }

    function checkTableInput() {
      const val = document.getElementById("table-select").value;
      document.getElementById("manual-table-div").style.display = (val === 'walk-in') ? 'block' : 'none';
    }

    async function processPayment(method) {
      const selectVal = document.getElementById("table-select").value;
      let tableNum = selectVal;

      if (!selectVal) { alert("Please select your seating location."); return; }

      if (selectVal === 'walk-in') {
        tableNum = document.getElementById("manual-table-input").value;
        if (!tableNum) { alert("Please enter the Table Number on your table stand."); return; }
      }

      if (method === 'Card' && !document.getElementById("card-form").checkValidity()) {
        alert("Invalid Card Details");
        return;
      }

      if (!confirm(`Confirm payment of ₹${cartTotal}?`)) return;

      const fd = new FormData();
      fd.append("action", "place_order");
      fd.append("user_id", currentUser.id);
      fd.append("payment_method", method);
      fd.append("table_number", tableNum);
      fd.append("payment_status", method === 'Counter' ? 'Pending' : 'Paid');

      try {
        const res = await fetch("api.php", { method: "POST", body: fd });
        const data = await res.json();

        if (data.success) {
          alert("Order Placed Successfully!");
          window.location.href = "my_bookings.html";
        } else {
          alert("Error: " + data.message);
        }
      } catch (e) {
        console.error(e);
      }
    }

    function togglePayView(m) {
      document.querySelectorAll('.checkout-step').forEach(e => e.classList.remove('active'));
      document.getElementById('view-' + m).classList.add('active');
    }

    function resetView() {
      document.querySelectorAll('.checkout-step').forEach(e => e.classList.remove('active'));
      document.getElementById('step-method').classList.add('active');
    }

    // ✅ IMPORTANT: only load table options if cart has items
    (async () => {
      await loadCart();
      if (cartHasItems) {
        await loadTableOptions();
      }
    })();
  </script>

</body>
</html>
