<main class="container-narrow section">
  <h1 class="page-title">Contact</h1>
  <p class="small-muted">Send a message (saved in database). Map uses iframe.</p>

  <div class="grid-2 mt-3">
    <div class="glass p-4">
      <h2 class="h5 mb-3">Message Us</h2>

      <form id="contactForm" novalidate>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Name</label>
            <input id="cName" class="form-control" required>
            <div class="invalid-feedback">Enter name.</div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input id="cEmail" class="form-control" required>
            <div class="invalid-feedback">Enter valid email.</div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Mobile</label>
            <input id="cPhone" class="form-control" required>
            <div class="invalid-feedback">Enter valid phone.</div>
          </div>

          <div class="col-12">
            <label class="form-label">Message</label>
            <textarea id="cMsg" class="form-control" rows="4" required></textarea>
            <div class="invalid-feedback">Write message.</div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="ct-btn" type="submit">Send</button>
            <button class="ct-btn" type="button" id="showMessages">Show Saved</button>
          </div>

          <div class="col-12"><div id="contactInfo" class="small-muted"></div></div>
        </div>
      </form>

      <div class="mt-3 table-responsive">
        <table class="table table-dark table-striped align-middle" id="msgTable">
          <thead>
            <tr><th>#</th><th>Name</th><th>Email</th><th>Message</th><th>Action</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="glass overflow-hidden">
      <iframe
        title="map"
        width="100%"
        height="520"
        style="border:0"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3672.2000477312427!2d72.571362!3d23.035834!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e84f7b0d3e4f3%3A0x0!2sAhmedabad!5e0!3m2!1sen!2sin!4v1710000000000">
      </iframe>
    </div>
  </div>
</main>
