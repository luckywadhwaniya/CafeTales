  <style>
    /* ==============================
       MICRO-INTERACTIONS (B)
    ============================== */

    /* Card hover */
    .card-hover {
      transition: transform .25s ease, box-shadow .25s ease;
    }

    .card-hover:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 20px 40px rgba(0, 0, 0, .45);
    }

    /* Button hover */
    .btn-soft {
      border: 1px solid rgba(255, 255, 255, .20);
      background: rgba(255, 255, 255, .08);
      color: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .btn-soft:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, .35);
      background: rgba(255, 255, 255, .14);
    }

    /* ==============================
       REVEAL ANIMATION (Scroll)
    ============================== */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .6s ease, transform .6s ease;
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ==============================
       EVENTS UI
    ============================== */
    .event-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    @media (max-width: 992px) {
      .event-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 600px) {
      .event-grid {
        grid-template-columns: 1fr;
      }
    }

    .event-card {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .06);
    }

    .event-img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      display: block;
    }

    .event-body {
      padding: 14px;
    }

    .event-title {
      margin: 0;
      font-weight: 750;
      font-size: 18px;
    }

    .event-meta {
      font-size: 13px;
      color: rgba(255, 255, 255, .75);
      margin-top: 6px;
    }

    .chip {
      display: inline-block;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .20);
      margin-right: 6px;
      margin-top: 8px;
      color: rgba(255, 255, 255, .88);
      background: rgba(255, 255, 255, .06);
      white-space: nowrap;
    }

    .chip-ok {
      border-color: rgba(120, 255, 170, .25);
      color: rgba(200, 255, 220, .95);
    }

    .chip-full {
      border-color: rgba(255, 120, 120, .25);
      color: rgba(255, 210, 210, .95);
    }

    .chip-reg {
      border-color: rgba(120, 180, 255, .25);
      color: rgba(210, 230, 255, .95);
    }

    /* Modal theme */
    .modal-content {
      background: #121417;
      color: rgba(255, 255, 255, .92);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, .12);
    }

    .modal-header,
    .modal-footer {
      border-color: rgba(255, 255, 255, .10);

    .form-control {
      background: rgba(255, 255, 255, .06);

      color: rgba(255, 255, 255, .92);
    }

    .form-control::placeholder {

    }

    .msg-ok {
      color: rgba(200, 255, 220, .95);
    }

    .msg-bad {
      color: rgba(255, 200, 200, .95);
    }

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    /* ==============================
       1) REVEAL: where to add .reveal?
       - You add class="reveal" on any section/card you want animated.
       - This JS automatically adds .show when it comes in view.
    ============================== */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));

    /* ==============================
       2) EVENTS DATA + SEATS
    ============================== */
    const REG_KEY = "cafetales_event_regs_final";
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function loadRegs() {
      try { return JSON.parse(localStorage.getItem(REG_KEY)) || []; }
      catch { return []; }
    }
    function saveRegs(list) {
      localStorage.setItem(REG_KEY, JSON.stringify(list));
    }

    function nextWeekday(weekdayIndex, hour, minute) {
      const now = new Date();
      const dt = new Date(now);
      dt.setHours(hour, minute, 0, 0);
      const diff = (weekdayIndex - dt.getDay() + 7) % 7;
      if (diff === 0 && dt <= now) dt.setDate(dt.getDate() + 7);
      else dt.setDate(dt.getDate() + diff);
      return dt;
    }

    function formatDT(dt) {
      return dt.toLocaleString(undefined, {
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    function msToCountdown(ms) {
      if (ms <= 0) return "Started";
      const sec = Math.floor(ms / 1000);
      const d = Math.floor(sec / 86400);
      const h = Math.floor((sec % 86400) / 3600);
      const m = Math.floor((sec % 3600) / 60);
      return `${d}d ${h}h ${m}m`;
    }

        capacity: 15,

    function seatsLeft(eventId) {
      const ev = EVENTS.find(e => e.id === eventId);
      const used = loadRegs().filter(r => r.eventId === eventId).length;
      return Math.max(0, ev.capacity - used);
    }

    function isRegistered(eventId, email) {
      const e = (email || "").trim().toLowerCase();
      return loadRegs().some(r => r.eventId === eventId && r.email.toLowerCase() === e);
    }

    /* ==============================
       3) RENDER EVENTS (with reveal)
    ============================== */
    const grid = document.getElementById("eventGrid");
    const search = document.getElementById("search");

    function render() {
      const q = (search.value || "").trim().toLowerCase();
      grid.innerHTML = "";

      const list = EVENTS
        .map(ev => ({ ev, start: ev.nextStart() }))
        .sort((a, b) => a.start - b.start)
        .filter(x => x.ev.title.toLowerCase().includes(q) || x.ev.tag.toLowerCase().includes(q));

      if (list.length === 0) {
        grid.innerHTML = `<div class="small-muted">No events found.</div>`;
        return;
      }

      list.forEach(({ ev, start }) => {
        const left = seatsLeft(ev.id);
        const cd = msToCountdown(start.getTime() - Date.now());

        const seatChip = left <= 0
          ? `<span class="chip chip-full">FULL</span>`
          : `<span class="chip chip-ok">${left}/${ev.capacity} seats left</span>`;

        const card = document.createElement("div");
        card.className = "event-card card-hover reveal";   // ✅ reveal added here
        card.innerHTML = `
        <img class="event-img" src="${ev.img}" alt="${ev.title}">
        <div class="event-body">
          <h5 class="event-title">${ev.title}</h5>
          <div class="event-meta">${formatDT(start)} • Starts in: ${cd}</div>

          <div>
            <span class="chip">${ev.tag}</span>
            ${seatChip}
          </div>

          <div class="mt-3">
            <button class="btn-soft" data-open="${ev.id}">View & Register</button>
          </div>
        </div>
      `;
        grid.appendChild(card);

        // ✅ IMPORTANT: Newly created reveal elements must be observed too
        observer.observe(card);
      });
    }

    search.addEventListener("input", render);

    /* ==============================
       4) MODAL REGISTER
    ============================== */
    const modal = new bootstrap.Modal(document.getElementById("eventModal"));
    const mTitle = document.getElementById("mTitle");
    const mTag = document.getElementById("mTag");
    const mImg = document.getElementById("mImg");
    const mDesc = document.getElementById("mDesc");
    const mNext = document.getElementById("mNext");
    const mSeats = document.getElementById("mSeats");
    const mCountdown = document.getElementById("mCountdown");

    const mEmail = document.getElementById("mEmail");
    const mMsg = document.getElementById("mMsg");
    const mRegister = document.getElementById("mRegister");
    const mCancel = document.getElementById("mCancel");

    let activeId = null;
    let countdownTimer = null;

    function openModal(eventId) {
      const ev = EVENTS.find(e => e.id === eventId);
      if (!ev) return;

      activeId = eventId;
      const start = ev.nextStart();
      const left = seatsLeft(eventId);

      mTitle.textContent = ev.title;
      mTag.textContent = ev.tag;
      mImg.src = ev.img;
      mDesc.textContent = ev.desc;

      mNext.textContent = `Next: ${formatDT(start)}`;
      mSeats.textContent = left <= 0 ? `Seats: FULL` : `Seats: ${left}/${ev.capacity}`;
      mMsg.textContent = "";

      function tick() {
        mCountdown.textContent = `Starts in: ${msToCountdown(start.getTime() - Date.now())}`;
      }
      clearInterval(countdownTimer);
      tick();
      countdownTimer = setInterval(tick, 1000);

      // button state
      mRegister.disabled = (left <= 0);
      modal.show();
    }

    grid.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-open]");
      if (!btn) return;
      openModal(btn.dataset.open);
    });

    mRegister.addEventListener("click", () => {
      const email = (mEmail.value || "").trim();
      if (!emailRegex.test(email)) {
        mMsg.innerHTML = `<span class="msg-bad">Enter a valid email.</span>`;
        return;
      }

      if (isRegistered(activeId, email)) {
        mMsg.innerHTML = `<span class="msg-bad">Already registered with this email.</span>`;
        return;
      }

      const ev = EVENTS.find(e => e.id === activeId);
      const left = seatsLeft(activeId);
      if (left <= 0) {
        mMsg.innerHTML = `<span class="msg-bad">Event is FULL.</span>`;
        return;
      }

      const regs = loadRegs();
      regs.unshift({ id: crypto.randomUUID(), eventId: activeId, email, at: new Date().toISOString() });
      saveRegs(regs);

      mMsg.innerHTML = `<span class="msg-ok">Seat confirmed ✅</span>`;

      // update seats immediately
      const newLeft = seatsLeft(activeId);
      mSeats.textContent = newLeft <= 0 ? `Seats: FULL` : `Seats: ${newLeft}/${ev.capacity}`;
      mRegister.disabled = true;

      render();
    });

    mCancel.addEventListener("click", () => {
      const email = (mEmail.value || "").trim();
      if (!emailRegex.test(email)) {
        mMsg.innerHTML = `<span class="msg-bad">Enter your email to cancel.</span>`;
        return;
      }

      const before = loadRegs();
      const after = before.filter(r => !(r.eventId === activeId && r.email.toLowerCase() === email.toLowerCase()));
      saveRegs(after);

      if (after.length === before.length) {
        mMsg.innerHTML = `<span class="msg-bad">No registration found for this email.</span>`;
        return;
      }

      mMsg.innerHTML = `<span class="msg-ok">Registration cancelled ✅</span>`;
      mRegister.disabled = false;
      render();
    });

    document.getElementById("eventModal").addEventListener("hidden.bs.modal", () => {
      clearInterval(countdownTimer);
      countdownTimer = null;
      activeId = null;
    });

    // Init
    render();
  </script>

  <!-- Keep if you want (optional) -->
  <script src="global.js"></script>
</body>

</html>
