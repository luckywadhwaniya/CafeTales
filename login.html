<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CafeTales — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    /* Specific style to center the auth card perfectly */
    .auth-container {
      max-width: 420px;
      margin: 40px auto;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="index.html">
      <img
        src="https://cdn-icons-png.flaticon.com/512/924/924514.png"
        alt="CafeTales Logo"
        class="navbar-logo"
      >
      <span>CafeTales</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a data-nav class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a data-nav class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a data-nav class="nav-link" href="reservation.html">Reserve</a></li>
        <li class="nav-item"><a data-nav class="nav-link" href="offers.html">Offers</a></li>
        <li class="nav-item"><a data-nav class="nav-link" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a data-nav class="nav-link" href="events.html">Events</a></li>
        <li class="nav-item"><a data-nav class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a data-nav class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item"><a data-nav class="nav-link active" href="login.html">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container section">
  <div class="auth-container reveal">
    
    <div id="loginSection" class="glass p-4 card-hover">
      <div class="text-center mb-4">
        <h1 class="h4 mb-1">Welcome Back</h1>
        <p class="small-muted">Login to continue</p>
      </div>

      

      <form id="logForm" class="d-flex flex-column gap-3">
        <div>
          <label class="form-label small-muted">Email</label>
          <input id="lEmail" type="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
        </div>
        <div>
          <label class="form-label small-muted">Password</label>
          <input id="lPass" type="password" class="form-control" placeholder="••••••" required autocomplete="current-password">
        </div>
        
        <button class="ct-btn w-100 mt-2" type="submit">Login</button>
        <div id="lMsg" class="text-center mt-2" style="min-height:20px;"></div>
      </form>

      <div class="text-center mt-4 small-muted">
        Don't have an account? <a href="#" id="showRegister" class="text-white text-decoration-underline">Register here</a>
      </div>
    </div>

    <div id="registerSection" class="glass p-4 card-hover" style="display: none;">
      <div class="text-center mb-4">
        <h1 class="h4 mb-1">Create Account</h1>
        <p class="small-muted">Join the CafeTales community</p>
      </div>

      <form id="regForm" class="d-flex flex-column gap-3">
        <div>
          <label class="form-label small-muted">Full Name</label>
          <input id="rName" class="form-control" placeholder="John Doe" required autocomplete="name">
        </div>
        <div>
          <label class="form-label small-muted">Email</label>
          <input id="rEmail" type="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
        </div>
        <div>
          <label class="form-label small-muted">Password (6+ chars)</label>
          <input id="rPass" type="password" class="form-control" placeholder="••••••" required autocomplete="new-password">
        </div>
        
        <button class="ct-btn w-100 mt-2" type="submit">Create Account</button>
        <div id="rMsg" class="text-center mt-2" style="min-height:20px;"></div>
      </form>

      <div class="text-center mt-4 small-muted">
        Already have an account? <a href="#" id="showLogin" class="text-white text-decoration-underline">Login here</a>
      </div>
    </div>

  </div>
</main>

<footer class="footer">
  <div class="container-narrow text-center">© <span id="year"></span> CafeTales</div>
</footer>

<script>document.getElementById("year").textContent = new Date().getFullYear();</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="global.js"></script>
<script src="auth.js"></script>

</body>
</html>
