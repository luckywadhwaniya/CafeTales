<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CafeTales — My Activity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
      .history-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 15px; padding: 15px; }
      .badge-soft { background: rgba(255, 183, 3, 0.2); color: #ffb703; border: 1px solid #ffb703; }
  </style>
</head>
<body class="bg-dark text-white">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-bottom border-secondary">
    <div class="container"><a class="navbar-brand text-warning fw-bold" href="index.html">CafeTales</a></div>
  </nav>

  <div class="container py-5">
    <h3 class="text-warning mb-4">📅 My Reservations</h3>
    <div class="card bg-dark text-white border border-secondary shadow-lg mb-5">
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0 align-middle">
          <thead class="text-secondary border-secondary">
            <tr><th>Date & Time</th><th>Table</th><th>Details</th><th>Status</th></tr>
          </thead>
          <tbody id="bookingList">
            <tr><td colspan="4" class="text-center p-4 text-muted">Loading reservations...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <h3 class="text-warning mb-4">🍜 Order History</h3>
    <div id="orderHistoryList">
        <div class="text-center py-4 text-muted">Loading orders...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const session = JSON.parse(localStorage.getItem("cafetales_session_v3"));
    if (!session) window.location.href = "login.html";

    async function loadActivity() {
        try {
            const fd = new FormData();
            fd.append("user_id", session.id);

            // 1. Load Bookings
            fd.set("action", "get_my_bookings");
            const bRes = await fetch("api.php", { method: "POST", body: fd });
            const bookings = await bRes.json();
            
            const bList = document.getElementById("bookingList");
            bList.innerHTML = "";
            
            if(!bookings || bookings.length === 0) {
                bList.innerHTML = '<tr><td colspan="4" class="text-center p-4 text-muted">No reservations found.</td></tr>';
            } else {
                bookings.forEach(b => {
                    let badge = b.status === 'confirmed' ? 'bg-success' : 'bg-secondary';
                    // Show assigned table if confirmed
                    let tableInfo = b.status === 'confirmed' ? `<span class="badge badge-soft">Table ${b.table_number || 'TBD'}</span>` : '-';
                    
                    bList.innerHTML += `
                        <tr>
                            <td>${b.reservation_date}<br><small class="text-muted">${b.reservation_time}</small></td>
                            <td>${tableInfo} <br> <small class="text-muted">${b.seating_area}</small></td>
                            <td>${b.guests} Guests</td>
                            <td><span class="badge ${badge}">${b.status.toUpperCase()}</span></td>
                        </tr>`;
                });
            }

            // 2. Load Orders
            fd.set("action", "get_user_orders");
            const oRes = await fetch("api.php", { method: "POST", body: fd });
            const orders = await oRes.json();
            
            const oList = document.getElementById("orderHistoryList");
            oList.innerHTML = "";
            
            if(!orders || orders.length === 0) {
                oList.innerHTML = '<div class="text-muted text-center py-4 border border-secondary rounded">No past orders found.</div>';
            } else {
                orders.forEach(o => {
                    let payBadge = o.payment_status === 'Paid' ? 'bg-success' : 'bg-danger';
                    oList.innerHTML += `
                        <div class="history-card d-flex justify-content-between align-items-center">
                            <div>
                                <div class="d-flex align-items-center gap-2 mb-1">
                                    <span class="badge bg-secondary">#${o.id}</span>
                                    <small class="text-muted">${o.order_date}</small>
                                </div>
                                <div class="fw-bold">${o.items || 'No items listed'}</div>
                            </div>
                            <div class="text-end">
                                <div class="text-warning fw-bold fs-5">₹${o.total_amount}</div>
                                <span class="badge ${payBadge} small">${o.payment_status}</span>
                            </div>
                        </div>`;
                });
            }
        } catch(e) {
            console.error("Load Error:", e);
        }
    }
    loadActivity();
  </script>
</body>
</html>
